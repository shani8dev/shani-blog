<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog</title>
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">

  <!-- ═══ GitHub Pages SPA 404 redirect ════════════════════════════════
       Encodes the current path + query + hash into the index page URL so
       the SPA router on index.html can restore it.
       This is the ONLY script needed in 404.html — no CSS, no heavy libs.
  ════════════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      var l = window.location;
      var path   = l.pathname;
      var search = l.search ? l.search.slice(1) : '';
      var hash   = l.hash   ? l.hash.slice(1)   : '';
      var redirect = l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') + '/' +
        '?p=' + encodeURIComponent(path) +
        (search ? '&q=' + encodeURIComponent(search) : '') +
        (hash   ? '&h=' + encodeURIComponent(hash)   : '');
      l.replace(redirect);
    })();
  </script>

  <!-- Apply saved theme before redirect fires to prevent any flash -->
  <script>
    (function () {
      var pfx = (typeof CONFIG !== 'undefined' && CONFIG.STORAGE_PREFIX) ? CONFIG.STORAGE_PREFIX : 'shani';
      var t = localStorage.getItem(pfx + '_theme') ||
              (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <!-- Page is immediately redirected by the script above.
       This fallback is only visible if JS is completely disabled. -->
  <noscript>
    <div style="text-align:center;padding:4rem 2rem;font-family:sans-serif">
      <strong>JavaScript is required to view this blog.</strong>
    </div>
  </noscript>
</body>
</html>
