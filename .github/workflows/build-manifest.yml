# .github/workflows/build-manifest.yml
#
# ─────────────────────────────────────────────────────────────────
#  HOW SECRETS WORK HERE
# ─────────────────────────────────────────────────────────────────
#  Q: Do I need to create any secrets?
#  A: No. GitHub automatically provides secrets.GITHUB_TOKEN to every
#     workflow. It has read access to this repo (public or private)
#     and write access to commit back. You don't create it — it exists.
#
#  Q: Does the token ever reach the browser?
#  A: Never. It is only used inside this workflow runner (a temporary
#     VM that GitHub spins up and destroys). The browser only ever
#     fetches posts/manifest.json — a static file with no token in it.
#
#  Q: What about private repos?
#  A: Works perfectly. The checkout step uses GITHUB_TOKEN to clone
#     the private repo onto the runner. The Node script reads files
#     directly from disk — no GitHub API calls, no auth needed at
#     runtime. The resulting manifest.json is a plain JSON file.
#
#  Q: What if I want posts in a *separate* private repo?
#  A: Create a fine-grained PAT (Settings -> Developer settings ->
#     Fine-grained tokens) with "Contents: Read" on that repo.
#     Add it as a repo secret named POSTS_PAT
#     (Settings -> Secrets -> Actions -> New repository secret).
#     Then change the checkout step below to use it:
#       token: ${{ secrets.POSTS_PAT }}
#       repository: your-org/your-posts-repo
# ─────────────────────────────────────────────────────────────────

name: Build posts manifest

on:
  push:
    branches: [main]
    paths:
      - 'posts/**.md'
      - '.github/workflows/build-manifest.yml'
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write  # lets the workflow commit manifest.json back to the repo

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # secrets.GITHUB_TOKEN is provided automatically by GitHub.
          # You do not need to create this secret yourself.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── If posts live in a SEPARATE private repo, add this step ──
      # Uncomment, fill in the repo name, create a fine-grained PAT
      # with "Contents: Read" on that repo, add it as secret POSTS_PAT.
      #
      # - name: Checkout posts repo
      #   uses: actions/checkout@v4
      #   with:
      #     repository: shani8dev/shani-blog-posts
      #     token: ${{ secrets.POSTS_PAT }}
      #     path: posts-repo

      - name: Generate posts/manifest.json
        run: |
          node - << 'SCRIPT'
          const fs   = require('fs');
          const path = require('path');

          // If using a separate posts repo (see checkout step above),
          // change this to: path.join(process.cwd(), 'posts-repo', 'posts')
          const postsDir = path.join(process.cwd(), 'posts');

          if (!fs.existsSync(postsDir)) {
            console.error('posts/ directory not found.');
            process.exit(1);
          }

          const files = fs.readdirSync(postsDir)
            .filter(f => f.endsWith('.md') && f !== 'index.md')
            .sort();

          // ── Helpers ────────────────────────────────────────────
          function readTime(body) {
            const words = body.trim().split(/\s+/).length;
            return `${Math.max(1, Math.ceil(words / 200))} min`;
          }

          function autoExcerpt(body, paywalled) {
            const src = paywalled
              ? (body.split(/\n\n+/).find(l => l.trim() && !l.startsWith('#')) || body)
              : body;
            const plain = src
              .replace(/\`\`\`[\s\S]*?\`\`\`/g, '')
              .replace(/\`[^\`]+\`/g, '')
              .replace(/!?\[[^\]]*\]\([^)]*\)/g, '')
              .replace(/[*_~]{1,3}([^*_~]+)[*_~]{1,3}/g, '$1')
              .replace(/^#{1,6}\s+/gm, '')
              .replace(/^>\s*/gm, '')
              .replace(/^[-*+]\s+/gm, '')
              .replace(/\n/g, ' ')
              .trim();
            return plain.substring(0, 140) + (plain.length > 140 ? '\u2026' : '');
          }

          // ── Parse each .md file ────────────────────────────────
          // NOTE: body is intentionally NOT embedded in the manifest.
          // Keeping manifest.json as metadata-only keeps it tiny (~100 KB for
          // hundreds of posts vs 5+ MB with bodies). The SPA fetches each
          // post's .md file on-demand when the reader opens it and caches the
          // result in memory — so repeat visits within a session are instant.
          const posts = [];

          for (const file of files) {
            const raw  = fs.readFileSync(path.join(postsDir, file), 'utf8')
                           .replace(/^\uFEFF/, '');
            const slug = file.replace(/\.md$/, '');

            const fmMatch = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
            if (!fmMatch) {
              console.warn('Skipping ' + file + ' - no front-matter found');
              continue;
            }

            const fm   = {};
            const body = fmMatch[2];
            fmMatch[1].split(/\r?\n/).forEach(line => {
              const i = line.indexOf(':');
              if (i < 1) return;
              fm[line.slice(0, i).trim()] = line.slice(i + 1).trim()
                .replace(/^['"`]|['"`]$/g, '');
            });

            const isPaywalled = fm.paywalled === 'true';

            posts.push({
              slug,
              title:           fm.title           || 'Untitled',
              excerpt:         fm.excerpt          || autoExcerpt(body, isPaywalled),
              date:            fm.date             || new Date().toISOString().split('T')[0],
              tag:             fm.tag              || 'Post',
              readTime:        fm.readTime         || readTime(body),
              paywalled:       isPaywalled,
              cover:           fm.cover            || '',
              author:          fm.author           || '',
              author_role:     fm.author_role      || '',
              author_bio:      fm.author_bio       || '',
              author_initials: fm.author_initials  || '',
              author_linkedin: fm.author_linkedin  || '',
              author_github:   fm.author_github    || '',
              author_website:  fm.author_website   || '',
              // body is intentionally omitted — fetched on-demand by the SPA
            });

            console.log('  ' + (isPaywalled ? '[members]' : '[free]   ') + ' ' + slug);
          }

          posts.sort((a, b) => new Date(b.date) - new Date(a.date));

          const outPath = path.join(postsDir, 'manifest.json');
          fs.writeFileSync(outPath, JSON.stringify(posts, null, 2));
          console.log('\nWritten ' + posts.length + ' post(s) to posts/manifest.json');
          SCRIPT

      - name: Generate sitemap.xml
        run: |
          node - << 'SCRIPT'
          const fs   = require('fs');
          const path = require('path');
          const BLOG_URL = 'https://blog.shani.dev';
          const manifest = JSON.parse(fs.readFileSync(path.join(process.cwd(), 'posts', 'manifest.json'), 'utf8'));
          const staticUrls = [
            { loc: `${BLOG_URL}/`,                priority: '1.0', changefreq: 'weekly'  },
            { loc: `${BLOG_URL}/?tag=Engineering`, priority: '0.6', changefreq: 'weekly'  },
            { loc: `${BLOG_URL}/?tag=Release`,     priority: '0.6', changefreq: 'weekly'  },
            { loc: `${BLOG_URL}/?tag=Linux`,       priority: '0.6', changefreq: 'weekly'  },
            { loc: `${BLOG_URL}/?tag=News`,        priority: '0.6', changefreq: 'weekly'  },
          ];
          const postUrls = manifest.map(p => ({
            loc:        `${BLOG_URL}/post/${p.slug}`,
            lastmod:    p.date,
            priority:   '0.8',
            changefreq: 'monthly',
          }));
          const all = [...staticUrls, ...postUrls];
          const xml = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
            ...all.map(u => [
              '  <url>',
              `    <loc>${u.loc}</loc>`,
              u.lastmod ? `    <lastmod>${u.lastmod}</lastmod>` : null,
              `    <changefreq>${u.changefreq}</changefreq>`,
              `    <priority>${u.priority}</priority>`,
              '  </url>',
            ].filter(Boolean).join('\n')),
            '</urlset>',
          ].join('\n');
          fs.writeFileSync(path.join(process.cwd(), 'sitemap.xml'), xml);
          console.log('Written sitemap.xml with ' + all.length + ' URL(s)');
          SCRIPT

      - name: Commit manifest + sitemap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/manifest.json sitemap.xml
          git diff --staged --quiet && echo "nothing changed" || {
            git commit -m "chore: rebuild manifest + sitemap [skip ci]"
            git push
          }
