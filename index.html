  <!-- GitHub Pages SPA: restore real URL if we arrived via 404.html redirect -->
  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var p  = qs.get('p');
      if (!p) return;
      qs.delete('p');
      var q = qs.get('q') || '';  qs.delete('q');
      var h = qs.get('h') || '';  qs.delete('h');
      var url = decodeURIComponent(p);
      // Rewrite /posts/slug or /posts/slug.md → /post/slug so the SPA renders it styled
      var postsMatch = url.match(/^\/posts\/(.+?)(?:\.md)?(\?.*)?$/);
      if (postsMatch) url = '/post/' + postsMatch[1];
      if (q) url += '?' + decodeURIComponent(q);
      if (h) url += '#' + decodeURIComponent(h);
      history.replaceState(null, '', url);
    })();
  </script>
